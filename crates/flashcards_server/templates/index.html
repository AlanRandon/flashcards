{% extends "base.html" %}
{% block content %}
    <div class="mt-4 flex justify-center w-full">
        <form class="card p-2 grid max-w-[40ch]"
              method="GET"
              action="/"
              hx-boost="false"
              hx-get="/"
              hx-target="#search_results"
              hx-swap="outerHTML transition:false"
              hx-headers='{"hx-partial":true}'
              hx-push-url="true"
              hx-trigger="keyup changed delay:300ms from:find input, submit">
            <label for="query">Search</label>
            <input id="query"
                   type="search"
                   name="q"
                   class="input m-2"
                   value="{{ query }}">
        </form>
    </div>
    {% block search_results %}
        <main class="auto-grid-[20ch] p-4 gap-4" id="search_results">
            {% for topic in topics %}
                <div class="grid gap-4">
                    <div class="card flex flex-col">
                        <div class="grow p-4 text-white font-bold bg-rose-500">{{ topic.name }}</div>
                        <div class="flex gap-2 justify-center flex-wrap border-t-4 border-stone-900 p-4">
                            <a class="btn" href="/view/{{ topic.hash }}">View</a>
                            <a class="btn" href="/study/{{ topic.hash }}">Study</a>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </main>
    {% endblock %}
{% endblock %}
